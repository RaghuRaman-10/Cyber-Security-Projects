<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vigenère Cipher | Cyber Security Mini Project</title>
    <meta
      name="description"
      content="A simple Vigenère cipher encrypt/decrypt tool built with HTML, CSS, and JavaScript."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="header">
        <div class="header__title">
          <span class="badge">Crypto</span>
          <h1>Vigenère Cipher</h1>
        </div>
        <p class="header__subtitle">
          Encrypt and decrypt text using a keyword. Preserves spaces, punctuation, and letter case.
        </p>
      </header>

      <main class="card">
        <section class="grid">
          <div class="field">
            <label for="mode">Mode</label>
            <div class="segmented" role="tablist" aria-label="Cipher mode">
              <button id="modeEncrypt" class="segmented__btn is-active" type="button" role="tab">
                Encrypt
              </button>
              <button id="modeDecrypt" class="segmented__btn" type="button" role="tab">
                Decrypt
              </button>
            </div>
          </div>

          <div class="field">
            <label for="key">Key</label>
            <input
              id="key"
              type="text"
              inputmode="text"
              autocomplete="off"
              spellcheck="false"
              placeholder="e.g. SECURITY"
              aria-describedby="keyHelp"
            />
            <div class="help" id="keyHelp">Letters only (A–Z). Spaces are ignored.</div>
          </div>
        </section>

        <section class="field">
          <label for="inputText">Input</label>
          <textarea
            id="inputText"
            rows="6"
            placeholder="Type or paste your text here…"
          ></textarea>
        </section>

        <section class="actions">
          <button id="runBtn" class="btn btn--primary" type="button">Run</button>
          <button id="swapBtn" class="btn" type="button" title="Move output to input">
            Swap ↕
          </button>
          <button id="copyBtn" class="btn" type="button">Copy output</button>
          <button id="clearBtn" class="btn btn--danger" type="button">Clear</button>
        </section>

        <section class="field">
          <div class="outputHeader">
            <label for="outputText">Output</label>
            <div class="status" id="status" aria-live="polite"></div>
          </div>
          <textarea id="outputText" rows="6" readonly placeholder="Your result will appear here…"></textarea>
        </section>

        <footer class="footer">
          <div class="footer__note">
            Educational use only. Classical ciphers are not secure for modern communications.
          </div>
        </footer>
      </main>
    </div>

    <script src="./script.js" defer></script>
  </body>
</html>
